<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>UnglamorousAI — the boring AI that's quietly invading every corporation</title>
  <meta name="description" content="A practitioner's notebook on purpose-built AI agents in production. Long-form tutorials, sharp notes, and live streams." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" />

  <style>
    :root {
      --bg: oklch(0.16 0.005 250);
      --bg-elev: oklch(0.20 0.005 250);
      --bg-deep: oklch(0.13 0.005 250);
      --fg: oklch(0.96 0.005 250);
      --muted: oklch(0.72 0.005 250);
      --muted-2: oklch(0.55 0.005 250);
      --border: oklch(0.28 0.005 250);
      --border-strong: oklch(0.36 0.005 250);
      --accent: oklch(0.86 0.18 130);
      --accent-2: oklch(0.74 0.17 165);
      --accent-3: oklch(0.80 0.15 60);
      --font-sans: "Geist", system-ui, -apple-system, sans-serif;
      --font-mono: "Geist Mono", ui-monospace, monospace;
      --container-w: 1240px;
      --base-fs: 16px;
      --grid-gap: 16px;
      --show-clock: inline;
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      background: var(--bg);
      color: var(--fg);
      font-family: var(--font-sans);
      font-size: var(--base-fs);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    body {
      background:
        radial-gradient(ellipse 1200px 600px at 50% -10%, color-mix(in oklch, var(--accent) 6%, transparent), transparent 60%),
        var(--bg);
      background-attachment: fixed;
    }

    .font-mono { font-family: var(--font-mono); font-feature-settings: "ss01", "cv02"; }

    .container {
      width: 100%;
      max-width: var(--container-w);
      margin: 0 auto;
      padding: 0 32px;
    }

    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: none; }

    h1, h2, h3, h4 { font-weight: 600; letter-spacing: -0.015em; }

    /* Hide live clock when tweak is off */
    header nav span:last-child { display: var(--show-clock); }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 11px 18px;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.01em;
      cursor: pointer;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--fg);
      text-decoration: none;
      transition: all 140ms;
      border-radius: 2px;
    }
    .btn:hover { border-color: var(--border-strong); }
    .btn-primary {
      background: var(--accent);
      color: var(--bg);
      border-color: var(--accent);
    }
    .btn-primary:hover {
      background: color-mix(in oklch, var(--accent) 88%, white);
      border-color: color-mix(in oklch, var(--accent) 88%, white);
    }
    .btn-ghost { background: transparent; color: var(--fg); }

    /* Post card hover */
    .post-card:hover { border-color: var(--accent); transform: translateY(-2px); }
    .post-row { transition: background-color 160ms; }
    .post-row:hover { background: var(--bg-elev); }
    .post-row-arrow { opacity: 0; transition: opacity 160ms, transform 160ms; }
    .post-row:hover .post-row-arrow { opacity: 1; transform: translateX(3px); }

    /* Blinking cursor */
    .blink { animation: blink 1.1s steps(2) infinite; }
    @keyframes blink { 50% { opacity: 0; } }

    /* Route fade-in */
    .route-fade { animation: routefade 260ms ease-out; }
    @keyframes routefade { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

    /* Article body */
    .article-body { font-size: 18px; line-height: 1.7; color: oklch(0.90 0.005 250); }
    .article-body p { margin: 0 0 22px; }
    .article-body h2 {
      font-size: 28px;
      margin: 48px 0 16px;
      letter-spacing: -0.02em;
      color: var(--fg);
    }
    .article-body h2::before {
      content: "## ";
      color: var(--accent);
      font-family: var(--font-mono);
      font-weight: 400;
      opacity: 0.7;
    }
    .article-body h3 {
      font-size: 20px;
      margin: 32px 0 12px;
    }
    .article-body .callout {
      border-left: 3px solid var(--accent);
      background: color-mix(in oklch, var(--accent) 6%, transparent);
      padding: 16px 20px;
      margin: 24px 0;
      font-size: 18px;
      color: var(--fg);
      font-style: normal;
    }
    .article-body .code-block {
      background: var(--bg-deep);
      border: 1px solid var(--border);
      margin: 24px 0;
      padding: 0;
      overflow: hidden;
      font-size: 13px;
    }
    .article-body .code-bar {
      display: flex;
      justify-content: space-between;
      padding: 8px 14px;
      border-bottom: 1px solid var(--border);
      font-size: 11px;
      color: var(--muted-2);
      letter-spacing: 0.04em;
    }
    .article-body .code-block code {
      display: block;
      padding: 16px 18px;
      white-space: pre;
      overflow-x: auto;
      line-height: 1.55;
      color: var(--fg);
    }

    /* Streams player */
    .player-frame {
      aspect-ratio: 16 / 9.5;
      border: 1px solid var(--border);
      background: var(--bg-deep);
      position: relative;
      overflow: hidden;
    }
    .player-grid {
      position: absolute; inset: 0;
      background-image:
        linear-gradient(to right, color-mix(in oklch, var(--accent) 8%, transparent) 1px, transparent 1px),
        linear-gradient(to bottom, color-mix(in oklch, var(--accent) 6%, transparent) 1px, transparent 1px);
      background-size: 32px 32px;
      mask-image: radial-gradient(ellipse at 30% 40%, black, transparent 75%);
    }
    .player-overlay {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 28px 32px 56px;
      background: linear-gradient(to top, var(--bg-deep) 30%, transparent);
    }
    .player-bottom {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      display: flex; align-items: center;
      padding: 8px 14px;
      font-size: 10px;
      border-top: 1px solid var(--border);
      background: var(--bg);
    }

    /* Stream row */
    .stream-row { transition: background 140ms, border-color 140ms; }
    .stream-row:hover { background: var(--bg-elev); border-color: var(--border-strong); }
    .stream-row:first-of-type { border-top: 1px solid var(--border); }

    /* Contact card */
    .contact-card:hover { border-color: var(--accent); }

    /* Selection */
    ::selection { background: var(--accent); color: var(--bg); }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 0; }
    ::-webkit-scrollbar-thumb:hover { background: var(--border-strong); }

    /* Responsive */
    @media (max-width: 900px) {
      .container { padding: 0 20px; }
      .container > section > div[style*="grid-template-columns: repeat(3"] { grid-template-columns: 1fr !important; }
      .container > section[style*="grid-template-columns: 1.4fr"] { grid-template-columns: 1fr !important; }
      .container > section[style*="grid-template-columns: 1.6fr"] { grid-template-columns: 1fr !important; }
      .container > div[style*="grid-template-columns: 1fr 1fr"] { grid-template-columns: 1fr !important; }
      h1[style] { font-size: clamp(32px, 9vw, 56px) !important; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="data.jsx"></script>
  <script type="text/babel" src="components.jsx"></script>
  <script type="text/babel" src="pages.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
