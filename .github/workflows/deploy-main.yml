name: Build and Deploy Site

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Ensure deploy directory exists
        run: mkdir -p /var/www/unglamorousai.com

      - name: Deploy dist to web root
        run: rsync -a --delete dist/ /var/www/unglamorousai.com/
